name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v1

      - name: Build
        run: make

      - name: Build plugin
        run: make plugin

  meson:
    name: Meson (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v1

      - name: Install deps
        run: pip install meson ninja --break-system-packages

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

  debian:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential pkg-config

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v1

      - name: Build Debian package
        run: make -C dist/debian SUDO=

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: dist/debian/*.deb
          if-no-files-found: error
